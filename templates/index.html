<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadino Industrial Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 600px; margin: 50px auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #18bc9c; }
        #chat-window { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #fafafa; }
        
        /* Message Bubbles */
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; max-width: 80% ; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #18bc9c; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #ecf0f1; color: #2c3e50; border-bottom-left-radius: 2px; border: 1px solid #dcdcdc; }
        
        .status-indicator { font-size: 0.8rem; margin-top: 5px; color: #7f8c8d; }
        .online-dot { height: 10px; width: 10px; background-color: #27ae60; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .input-area { padding: 20px; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h4 class="mb-0">Broadino Control Terminal</h4>
        <div class="status-indicator">
            <span class="online-dot"></span> System Live: 172.20.10.2
        </div>
    </div>

    <div id="chat-window">
        <div class="message bot-msg">System Initialized. Awaiting industrial command...</div>
    </div>

    <div class="input-area">
        <div class="input-group">
            <input type="text" id="user-msg" class="form-control" placeholder="Type command (e.g. 'Status' or 'Turn on')..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="btn btn-primary" id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-msg');
        const chatWindow = document.getElementById('chat-window');
        const msgText = input.value.trim();

        if (msgText === "") return;

        // 1. Add User Message to UI
        appendMessage(msgText, 'user-msg');
        input.value = '';

        try {
            // 2. Send to Flask Backend
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msgText })
            });
            
            const data = await response.json();

            // 3. Add Bot Response to UI
            appendMessage(data.response, 'bot-msg');
        } catch (error) {
            appendMessage("Error: Could not connect to Broadino Backend.", 'bot-msg');
        }
    }

    function appendMessage(text, className) {
        const chatWindow = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        
        // Auto-scroll to bottom
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
