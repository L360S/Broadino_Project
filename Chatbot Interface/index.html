<!DOCTYPE html>
<html>
<body style="background:#222; color:white; padding:50px; font-family:sans-serif;">
    <h2>Broadino Interface</h2>
    <div id="chat" style="border:1px solid #555; height:200px; overflow-y:auto; padding:10px; margin-bottom:10px;"></div>
    <input type="text" id="msg" style="width:70%;"><button onclick="send()">Send</button>

    <script>
        async function send() {
            let input = document.getElementById("msg");
            let chat = document.getElementById("chat");
            chat.innerHTML += `<p><b>You:</b> ${input.value}</p>`;
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input.value})
            });
            const data = await res.json();
            chat.innerHTML += `<p style="color:cyan"><b>Bot:</b> ${data.response}</p>`;
            input.value = "";
        }
    </script>
</body>
</html>
